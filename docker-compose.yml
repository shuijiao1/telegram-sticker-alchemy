services:
  sticker-alchemy:
    image: ghcr.io/shuijiao1/telegram-sticker-alchemy:latest
    container_name: sticker-alchemy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TMP_DIR: ${TMP_DIR:-/tmp/sticker-alchemy}
    volumes:
      - ./data:/app/data
      - ./tmp:${TMP_DIR:-/tmp/sticker-alchemy}
